name: PHP Quality

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint-and-phpcs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer:v2

      - name: Validate PHP syntax (blocking)
        run: find . -name "*.php" -not -path "./vendor/*" -not -path "./.git/*" -print0 | xargs -0 -n1 php -l

      - name: Install PHPCS + WPCS
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require squizlabs/php_codesniffer wp-coding-standards/wpcs dealerdirect/phpcodesniffer-composer-installer
          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"
          echo "$HOME/.config/composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Run PHPCS (non-blocking report)
        continue-on-error: true
        run: phpcs --standard=WordPress-Core,WordPress-Docs,WordPress-Extra --extensions=php . --ignore=vendor/*,.git/*
